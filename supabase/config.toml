project_id = "prvzcbyeuqlstqrlbbum"

# "api" uses auth: "user" — platform JWT gate on.
[functions.api]
verify_jwt = true

# "ai" uses withSupabase auth:"user" INTERNALLY, so the platform gate is OFF — this
# lets the browser's CORS preflight (OPTIONS, no token) reach the function. The
# function still rejects unauthenticated requests via withSupabase.
[functions.ai]
verify_jwt = false

# "health" is public.
[functions.health]
verify_jwt = false

# "email-cron" is invoked by pg_cron with the service-role key, which it checks itself.
[functions.email-cron]
verify_jwt = false
