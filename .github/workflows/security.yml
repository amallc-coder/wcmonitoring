name: Security audit

# Dependency vulnerability scan for the backend. Runs on changes to server/,
# weekly, and on demand.
on:
  push:
    branches: [main]
    paths: ["server/**"]
  pull_request:
    paths: ["server/**"]
  schedule:
    - cron: "27 6 * * 1"   # Mondays
  workflow_dispatch: {}

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install (locked)
        run: npm ci --omit=dev
      - name: Audit (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high
